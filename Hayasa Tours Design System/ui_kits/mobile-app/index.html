<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hayasa Tours — Mobile App (Light)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" />
<style>
  /* Light "Lagoon Bungalow" theme — self-contained */
  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-2: #F0F4F3;
    --border: #D0E8E4;
    --text: #1A3A5C;          /* deep blue */
    --text-dim: #6A8A88;      /* muted teal-gray */
    --text-faint: #9DB6B4;
    --primary: #E2685E;       /* coral */
    --primary-press: #C9543F;
    --on-primary: #FFFFFF;
    --highlight: #FFE20B;
    --success: #2A9D6A;
    --teal: #1A7A8A;          /* interactive */
    --tab-active: #1A3A5C;
    --tab-inactive: #8AAAA8;
    --danger: #D43A3A;

    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #dcefe9; }
  ::selection { background: rgba(26,122,138,0.18); }

  .hb-canvas {
    min-width: 100%; width: max-content; min-height: 100vh;
    padding: 56px; box-sizing: border-box;
    background: radial-gradient(140% 100% at 50% 0%, #f3fbf9 0%, #dcefe9 70%);
    font-family: var(--font-body);
  }
  .hb-canvas-head { margin-bottom: 40px; }
  .hb-row { display: flex; gap: 36px; align-items: flex-start; }

  .hb-frame {
    position: relative; width: 372px; height: 806px; flex: none;
    background: #fff; border-radius: 52px; padding: 11px;
    box-shadow: 0 0 0 2px #cfe7e3, 0 40px 80px rgba(26,58,92,0.18);
  }
  .hb-notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 30px; background: #fff; border-radius: 0 0 18px 18px; z-index: 20;
  }
  .hb-viewport {
    width: 100%; height: 100%; border-radius: 42px; overflow: hidden;
    background: var(--bg); display: flex; flex-direction: column; position: relative;
  }

  .hb-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .hb-scroll { scrollbar-width: none; }

  .hb-card { background: var(--surface); border-radius: var(--radius); }
  .hb-shadow { box-shadow: 0 6px 20px rgba(26,58,92,0.08); }

  .hb-iconbtn {
    width: 40px; height: 40px; border-radius: 12px; background: var(--surface);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 2px 6px rgba(26,58,92,0.05);
  }
  .hb-glass { background: rgba(255,255,255,0.8) !important; backdrop-filter: blur(8px); border-color: rgba(255,255,255,0.6) !important; }

  .hb-btn:active { transform: scale(0.97); }
  .hb-btn-primary:hover { background: var(--primary-press) !important; }
  .hb-btn-teal:hover { background: #156876 !important; }

  .hb-chip {
    display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px;
    background: var(--highlight); color: #1A3A5C;
    font-family: var(--font-body); font-size: 11px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(255,226,11,0.4);
  }
  .hb-chip-ghost {
    display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    color: var(--text); font-family: var(--font-body); font-size: 11px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(26,58,92,0.1);
  }
  .hb-chip-sm {
    display: inline-flex; padding: 4px 10px; border-radius: 999px; background: var(--surface-2);
    border: 1px solid var(--border); color: var(--text-dim);
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
  }
  .hb-stat {
    flex: 1; display: flex; align-items: center; gap: 7px; padding: 11px 12px;
    background: var(--surface-2); border-radius: 12px;
  }

  .hb-input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 14px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none;
  }
  .hb-input:focus { border-color: var(--teal); }
  .hb-input::placeholder { color: var(--text-faint); }

  .hb-counter {
    width: 34px; height: 34px; border-radius: 9px; background: var(--teal); border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 3px 8px rgba(26,122,138,0.25);
  }
  .hb-counter:active { transform: scale(0.92); }

  .hb-seg {
    text-align: center; padding: 10px 12px; border-radius: 11px; background: var(--surface-2);
    border: 1px solid var(--border); color: var(--text-dim);
    font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s ease;
  }
  .hb-seg-on { background: var(--tab-active); border-color: var(--tab-active); color: #fff;
    box-shadow: 0 4px 12px rgba(26,58,92,0.2); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
